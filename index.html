<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sprite Sheet Editor</title>
<script src="https://pixijs.download/release/pixi.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#1a1a2e;--surface:#16213e;--border:#0f3460;--accent:#e94560;--accent2:#0f3460;--text:#eee;--dim:#666;--success:#1a6b3c}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;display:flex;flex-direction:column;height:100vh;overflow:hidden}

/* --- HEADER --- */
header{padding:10px 16px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;flex-wrap:wrap}
header h1{font-size:16px;margin-right:auto;color:var(--accent)}
.hdr-group{display:flex;align-items:center;gap:6px;font-size:13px}
.hdr-group label{color:var(--dim);font-size:11px;min-width:40px}
.hdr-group input{width:56px;background:var(--accent2);border:1px solid var(--border);color:#ccc;padding:4px 6px;border-radius:4px;font-size:13px;text-align:center}
.hdr-group input:focus{outline:1px solid var(--accent)}
.hdr-group span.sep{color:var(--dim);margin:0 2px}
.btn{padding:6px 14px;border-radius:6px;border:1px solid var(--border);background:var(--accent2);color:#ccc;cursor:pointer;font-size:13px;transition:all .15s}
.btn:hover{background:#1a4080;color:#fff}
.btn.primary{background:var(--accent);border-color:var(--accent);color:#fff}
.btn.primary:hover{background:#d63851}
.btn:disabled{opacity:.4;cursor:not-allowed}

/* --- MAIN LAYOUT --- */
.main{flex:1;display:flex;overflow:hidden}

/* --- SHEET AREA --- */
.sheet-area{flex:1;display:flex;flex-direction:column;overflow:hidden;position:relative}
.sheet-canvas-wrap{flex:1;overflow:auto;position:relative;background:repeating-conic-gradient(#222 0% 25%,#1a1a1a 0% 50%) 0 0/20px 20px;display:flex;align-items:flex-start;justify-content:center;padding:20px}
.sheet-canvas-wrap canvas{image-rendering:pixelated;cursor:crosshair}
.sheet-canvas-wrap canvas.empty{opacity:.3}
.empty-msg{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;color:var(--dim);pointer-events:none}
.empty-msg.hidden{display:none}
.empty-msg p{margin-bottom:12px;font-size:16px}
.empty-msg .hint{font-size:12px}

/* Frame strip preview */
.preview-strip{height:120px;min-height:120px;background:var(--surface);border-top:1px solid var(--border);display:flex;align-items:center;padding:8px 12px;gap:8px;overflow:hidden}
.preview-strip canvas{image-rendering:pixelated;background:repeating-conic-gradient(#222 0% 25%,#1a1a1a 0% 50%) 0 0/16px 16px;border-radius:4px;flex-shrink:0}
.preview-info{font-size:12px;color:var(--dim);white-space:nowrap}

/* --- SIDEBAR --- */
.sidebar{width:300px;background:var(--surface);border-left:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.sidebar-section{padding:14px;border-bottom:1px solid var(--border)}
.sidebar-section h3{font-size:11px;text-transform:uppercase;color:var(--dim);margin-bottom:10px;letter-spacing:.5px}

/* Grid config */
.grid-config{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.grid-config label{font-size:12px;color:#888}
.grid-config input{width:100%;background:var(--accent2);border:1px solid var(--border);color:#ccc;padding:5px 8px;border-radius:4px;font-size:13px}
.grid-config input:focus{outline:1px solid var(--accent)}
.grid-config .full{grid-column:1/-1}
.grid-config .row{display:flex;align-items:center;gap:8px;grid-column:1/-1}
.grid-config .row input[type="checkbox"]{width:auto;accent-color:var(--accent)}

/* Animation list */
.anim-list{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:4px;padding:0 14px 14px}
.anim-card{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:10px;cursor:pointer;transition:all .15s}
.anim-card:hover{border-color:#1a4080}
.anim-card.active{border-color:var(--accent);box-shadow:0 0 8px rgba(233,69,96,.2)}
.anim-card-header{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.anim-card-header .color{width:12px;height:12px;border-radius:3px;flex-shrink:0}
.anim-card-header .name{flex:1;font-size:13px;font-weight:600}
.anim-card-header .frames-count{font-size:11px;color:var(--dim);background:var(--accent2);padding:1px 6px;border-radius:10px}
.anim-card-header .del{background:none;border:none;color:var(--dim);cursor:pointer;font-size:16px;padding:2px 4px;line-height:1}
.anim-card-header .del:hover{color:var(--accent)}
.anim-card-fields{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.anim-card-fields label{font-size:11px;color:var(--dim)}
.anim-card-fields input,.anim-card-fields select{width:100%;background:var(--accent2);border:1px solid var(--border);color:#ccc;padding:4px 6px;border-radius:4px;font-size:12px}
.anim-card-fields input:focus,.anim-card-fields select:focus{outline:1px solid var(--accent)}
.anim-card-fields .full{grid-column:1/-1}
.anim-card-fields .row{display:flex;align-items:center;gap:6px;grid-column:1/-1}
.anim-card-fields .row input[type="checkbox"]{width:auto;accent-color:var(--accent)}
.anim-card-fields .row span{font-size:12px;color:#888}

/* Playback controls */
.playback{display:flex;align-items:center;gap:6px;margin-top:8px;grid-column:1/-1}
.playback .btn{padding:4px 10px;font-size:12px}
.playback .speed-label{font-size:11px;color:var(--dim);margin-left:auto}

/* Add anim button */
.add-anim-btn{margin:8px 14px;padding:8px;border:2px dashed var(--border);border-radius:8px;background:none;color:var(--dim);cursor:pointer;font-size:13px;text-align:center;transition:all .15s;flex-shrink:0}
.add-anim-btn:hover{border-color:var(--accent);color:var(--accent)}

/* Export */
.export-section{padding:14px;border-top:1px solid var(--border);flex-shrink:0}
.export-section .btn{width:100%;text-align:center;padding:10px;font-size:14px}

/* Toast */
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--success);color:#fff;padding:10px 20px;border-radius:8px;font-size:13px;opacity:0;transition:opacity .3s;pointer-events:none;z-index:100}
.toast.show{opacity:1}

/* Drop overlay */
.drop-overlay{position:absolute;inset:0;background:rgba(233,69,96,.12);border:3px dashed var(--accent);display:none;align-items:center;justify-content:center;z-index:10;font-size:16px;color:var(--accent)}
.drop-overlay.visible{display:flex}

/* Color palette for animations */
.anim-colors{--c0:#e94560;--c1:#0fbcf9;--c2:#f39c12;--c3:#2ecc71;--c4:#9b59b6;--c5:#1abc9c;--c6:#e74c3c;--c7:#3498db;--c8:#e67e22;--c9:#1dd1a1;--c10:#5f27cd}

/* Scrollbar */
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:#1a4080}
</style>
</head>
<body>

<header>
  <h1>🎯 Sprite Sheet Editor</h1>
  <div class="hdr-group">
    <label>Cell W</label>
    <input type="number" id="cellW" value="149" min="1" step="1">
    <span class="sep">×</span>
    <label>Cell H</label>
    <input type="number" id="cellH" value="164" min="1" step="1">
  </div>
  <div class="hdr-group">
    <label>Scale</label>
    <input type="number" id="viewScale" value="2" min="1" max="8" step="1">
    <span>x</span>
  </div>
  <button class="btn" id="btnUpload">📁 Upload PNG</button>
  <input type="file" id="fileInput" accept="image/png" hidden>
  <button class="btn primary" id="btnExport" disabled>💾 Export JSON</button>
</header>

<div class="main">
  <!-- Sheet canvas -->
  <div class="sheet-area">
    <div class="sheet-canvas-wrap" id="canvasWrap">
      <canvas id="sheetCanvas" class="empty"></canvas>
      <div class="empty-msg" id="emptyMsg">
        <p>📁 Upload a sprite sheet PNG</p>
        <div class="hint">or drag & drop here</div>
      </div>
      <div class="drop-overlay" id="dropOverlay">Drop PNG here</div>
    </div>
    <div class="preview-strip" id="previewStrip">
      <canvas id="previewCanvas" width="0" height="0"></canvas>
      <div class="preview-info" id="previewInfo">Select an animation to preview</div>
    </div>
  </div>

  <!-- Sidebar -->
  <div class="sidebar">
    <div class="sidebar-section">
      <h3>⚙️ Grid Settings</h3>
      <div class="grid-config">
        <div class="full">
          <label>Columns (auto-fill or set)</label>
          <input type="number" id="cols" value="0" min="0" title="0 = auto from cell width">
        </div>
        <div class="full">
          <label>Total frames (0 = auto)</label>
          <input type="number" id="totalFrames" value="0" min="0">
        </div>
        <div class="row">
          <input type="checkbox" id="showGrid" checked>
          <span>Show grid overlay</span>
        </div>
        <div class="row">
          <input type="checkbox" id="showNumbers" checked>
          <span>Show frame numbers</span>
        </div>
        <div class="row">
          <input type="checkbox" id="highlightActive" checked>
          <span>Highlight active animation frames</span>
        </div>
      </div>
    </div>

    <div class="sidebar-section" style="padding-bottom:6px">
      <h3>🎬 Animations</h3>
    </div>

    <div class="anim-list" id="animList">
      <!-- Animation cards appear here -->
    </div>

    <button class="add-anim-btn" id="addAnimBtn">+ Add Animation</button>

    <div class="export-section">
      <button class="btn primary" id="btnExport2" disabled>💾 Export PixiJS JSON</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ===== STATE =====
const S = {
  img: null,          // loaded Image
  imgW: 0, imgH: 0,  // original dimensions
  cellW: 149, cellH: 164,
  cols: 0,            // 0 = auto
  totalFrames: 0,     // 0 = auto
  rows: 0,
  actualCols: 0,
  actualRows: 0,
  actualFrames: 0,
  scale: 2,
  showGrid: true,
  showNumbers: true,
  highlightActive: true,
  animations: [],     // { id, name, start, end, timing, loop, color }
  activeAnimId: null,
  playingAnimId: null,
  animColors: ['#e94560','#0fbcf9','#f39c12','#2ecc71','#9b59b6','#1abc9c','#e74c3c','#3498db','#e67e22','#1dd1a1','#5f27cd','#fd79a8'],
  nextId: 1,
  colorIdx: 0,
};

const canvas = document.getElementById('sheetCanvas');
const ctx = canvas.getContext('2d');
const wrap = document.getElementById('canvasWrap');

// Preview
const prevCanvas = document.getElementById('previewCanvas');
const prevCtx = prevCanvas.getContext('2d');
let previewAnim = null; // PIXI AnimatedSprite
let previewApp = null;

// ===== FILE UPLOAD =====
const fileInput = document.getElementById('fileInput');
document.getElementById('btnUpload').addEventListener('click', () => fileInput.click());
fileInput.addEventListener('change', e => { if (e.target.files[0]) loadImage(e.target.files[0]); });

// Drag & drop
['dragenter','dragover'].forEach(ev => wrap.addEventListener(ev, e => { e.preventDefault(); document.getElementById('dropOverlay').classList.add('visible'); }));
['dragleave','drop'].forEach(ev => wrap.addEventListener(ev, e => { e.preventDefault(); document.getElementById('dropOverlay').classList.remove('visible'); }));
wrap.addEventListener('drop', e => {
  const f = e.dataTransfer.files[0];
  if (f && f.type === 'image/png') loadImage(f);
});

function loadImage(file) {
  const url = URL.createObjectURL(file);
  const img = new Image();
  img.onload = () => {
    S.img = img;
    S.imgW = img.width;
    S.imgH = img.height;
    document.getElementById('emptyMsg').classList.add('hidden');
    canvas.classList.remove('empty');
    updateGrid();
    render();
    updateExportBtn();
    toast(`Loaded: ${img.width}×${img.height}px`);
  };
  img.src = url;
}

// ===== GRID CALC =====
function updateGrid() {
  S.cellW = parseInt(document.getElementById('cellW').value) || 1;
  S.cellH = parseInt(document.getElementById('cellH').value) || 1;
  S.scale = parseInt(document.getElementById('viewScale').value) || 1;
  const colsInput = parseInt(document.getElementById('cols').value) || 0;
  const totalInput = parseInt(document.getElementById('totalFrames').value) || 0;

  if (S.img) {
    S.actualCols = colsInput > 0 ? colsInput : Math.floor(S.imgW / S.cellW);
    S.actualRows = Math.ceil(S.imgH / S.cellH);
    S.actualFrames = totalInput > 0 ? Math.min(totalInput, S.actualCols * S.actualRows) : S.actualCols * S.actualRows;
    S.rows = S.actualRows;
    S.cols = S.actualCols;

    // Auto-adjust cols/total fields
    if (colsInput === 0) document.getElementById('cols').value = S.actualCols;
    if (totalInput === 0) document.getElementById('totalFrames').value = S.actualFrames;
  } else {
    S.actualCols = 0;
    S.actualRows = 0;
    S.actualFrames = 0;
  }
}

// ===== RENDER =====
function render() {
  if (!S.img) return;
  const cw = S.actualCols * S.cellW;
  const ch = S.actualRows * S.cellH;
  const sw = cw * S.scale;
  const sh = ch * S.scale;
  canvas.width = sw;
  canvas.height = sh;

  ctx.imageSmoothingEnabled = false;
  ctx.drawImage(S.img, 0, 0, sw, sh);

  // Frame overlay
  for (let i = 0; i < S.actualFrames; i++) {
    const col = i % S.actualCols;
    const row = Math.floor(i / S.actualCols);
    const x = col * S.cellW * S.scale;
    const y = row * S.cellH * S.scale;
    const w = S.cellW * S.scale;
    const h = S.cellH * S.scale;

    // Highlight active animation
    if (S.highlightActive && S.activeAnimId !== null) {
      const anim = S.animations.find(a => a.id === S.activeAnimId);
      if (anim && i >= anim.start && i <= anim.end) {
        ctx.fillStyle = hexToRgba(anim.color, 0.15);
        ctx.fillRect(x, y, w, h);
      }
    }

    // Grid
    if (S.showGrid) {
      ctx.strokeStyle = 'rgba(255,255,255,0.15)';
      ctx.lineWidth = 1;
      ctx.strokeRect(x + .5, y + .5, w - 1, h - 1);
    }

    // Numbers
    if (S.showNumbers) {
      ctx.fillStyle = 'rgba(255,255,255,0.5)';
      ctx.font = `${Math.max(10, S.scale * 6)}px monospace`;
      ctx.textAlign = 'left';
      ctx.textBaseline = 'top';
      ctx.fillText(i, x + 3, y + 3);
    }
  }
}

// ===== ANIMATIONS =====
function addAnimation(start, end) {
  const id = S.nextId++;
  const color = S.animColors[S.colorIdx % S.animColors.length];
  S.colorIdx++;
  const anim = { id, name: `anim_${id}`, start: start || 0, end: end || (S.actualFrames - 1), timing: 150, loop: true, color };
  S.animations.push(anim);
  S.activeAnimId = id;
  renderAnimList();
  render();
  updateExportBtn();
  return anim;
}

function removeAnimation(id) {
  S.animations = S.animations.filter(a => a.id !== id);
  if (S.activeAnimId === id) S.activeAnimId = S.animations.length > 0 ? S.animations[0].id : null;
  if (S.playingAnimId === id) stopPreview();
  renderAnimList();
  render();
  updateExportBtn();
}

function renderAnimList() {
  const list = document.getElementById('animList');
  list.innerHTML = '';

  S.animations.forEach(anim => {
    const card = document.createElement('div');
    card.className = 'anim-card' + (anim.id === S.activeAnimId ? ' active' : '');
    card.dataset.id = anim.id;

    const total = anim.end - anim.start + 1;
    const fps = (1000 / anim.timing).toFixed(1);

    card.innerHTML = `
      <div class="anim-card-header">
        <div class="color" style="background:${anim.color}"></div>
        <div class="name">${anim.name}</div>
        <div class="frames-count">${total}f · ${fps}fps</div>
        <button class="del" data-del="${anim.id}" title="Delete">×</button>
      </div>
      <div class="anim-card-fields">
        <div class="full">
          <label>Name</label>
          <input type="text" value="${anim.name}" data-field="name">
        </div>
        <div>
          <label>Start frame</label>
          <input type="number" value="${anim.start}" min="0" data-field="start">
        </div>
        <div>
          <label>End frame</label>
          <input type="number" value="${anim.end}" min="0" data-field="end">
        </div>
        <div>
          <label>Timing (ms)</label>
          <input type="number" value="${anim.timing}" min="16" max="2000" step="10" data-field="timing">
        </div>
        <div class="row">
          <input type="checkbox" ${anim.loop ? 'checked' : ''} data-field="loop">
          <span>Loop</span>
        </div>
        <div class="playback">
          <button class="btn" data-play="${anim.id}">▶ Play</button>
          <button class="btn" data-stop="${anim.id}">⏹</button>
          <span class="speed-label">${total} frames @ ${fps}fps</span>
        </div>
      </div>
    `;

    // Click to select
    card.addEventListener('click', e => {
      if (e.target.closest('[data-field]') || e.target.closest('[data-del]') || e.target.closest('[data-play]') || e.target.closest('[data-stop]')) return;
      S.activeAnimId = anim.id;
      renderAnimList();
      render();
    });

    // Field changes
    card.querySelectorAll('[data-field]').forEach(input => {
      input.addEventListener('change', e => {
        e.stopPropagation();
        const field = e.target.dataset.field;
        if (field === 'loop') anim.loop = e.target.checked;
        else anim[field] = field === 'name' ? e.target.value : parseInt(e.target.value) || 0;
        if (anim.start > anim.end) anim.end = anim.start;
        renderAnimList();
        render();
        updateExportBtn();
      });
      input.addEventListener('click', e => e.stopPropagation());
    });

    // Delete
    card.querySelector('[data-del]').addEventListener('click', e => {
      e.stopPropagation();
      removeAnimation(anim.id);
    });

    // Play
    card.querySelector('[data-play]').addEventListener('click', e => {
      e.stopPropagation();
      playPreview(anim.id);
    });

    // Stop
    card.querySelector('[data-stop]').addEventListener('click', e => {
      e.stopPropagation();
      stopPreview();
    });

    list.appendChild(card);
  });
}

// ===== PREVIEW =====
function playPreview(animId) {
  stopPreview();

  const anim = S.animations.find(a => a.id === animId);
  if (!anim || !S.img) return;

  S.playingAnimId = animId;
  const total = anim.end - anim.start + 1;
  const frameW = S.cellW * 2;
  const frameH = S.cellH * 2;

  prevCanvas.width = frameW;
  prevCanvas.height = frameH;
  document.getElementById('previewInfo').textContent = `${anim.name} — ${total} frames @ ${(1000/anim.timing).toFixed(1)}fps ${anim.loop ? '🔁' : '▶️'}`;

  let frame = anim.start;
  let lastTime = 0;

  function tick(time) {
    if (S.playingAnimId !== animId) return;
    if (!lastTime) lastTime = time;

    if (time - lastTime >= anim.timing) {
      lastTime = time;
      frame = frame >= anim.end ? (anim.loop ? anim.start : anim.end) : frame + 1;
    }

    const col = frame % S.actualCols;
    const row = Math.floor(frame / S.actualCols);
    const sx = col * S.cellW;
    const sy = row * S.cellH;

    prevCtx.clearRect(0, 0, frameW, frameH);
    prevCtx.imageSmoothingEnabled = false;
    prevCtx.drawImage(S.img, sx, sy, S.cellW, S.cellH, 0, 0, frameW, frameH);

    requestAnimationFrame(tick);
  }

  requestAnimationFrame(tick);

  // Highlight active card
  S.activeAnimId = animId;
  renderAnimList();
  render();
}

function stopPreview() {
  S.playingAnimId = null;
  prevCtx.clearRect(0, 0, prevCanvas.width, prevCanvas.height);
  document.getElementById('previewInfo').textContent = 'Select an animation to preview';
}

// ===== EXPORT =====
function generateJSON() {
  const frames = {};
  const animations = {};
  const meta = { timing: {}, loop: {} };

  for (let i = 0; i < S.actualFrames; i++) {
    const col = i % S.actualCols;
    const row = Math.floor(i / S.actualCols);
    frames[`frame_${i}`] = {
      frame: { x: col * S.cellW, y: row * S.cellH, w: S.cellW, h: S.cellH }
    };
  }

  S.animations.forEach(anim => {
    const frameNames = [];
    for (let i = anim.start; i <= anim.end; i++) {
      frameNames.push(`frame_${i}`);
    }
    animations[anim.name] = frameNames;
    meta.timing[anim.name] = anim.timing;
    meta.loop[anim.name] = anim.loop;
  });

  const json = {
    frames,
    animations,
    meta: {
      image: 'spritesheet.png',
      size: { w: S.actualCols * S.cellW, h: S.actualRows * S.cellH },
      scale: 1,
      frameSize: { w: S.cellW, h: S.cellH },
      ...meta
    }
  };

  return json;
}

function doExport() {
  const json = generateJSON();
  const str = JSON.stringify(json, null, 2);
  const blob = new Blob([str], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'spritesheet.json';
  a.click();
  URL.revokeObjectURL(url);
  toast('✅ JSON exported!');
}

function updateExportBtn() {
  const has = S.img && S.animations.length > 0;
  document.getElementById('btnExport').disabled = !has;
  document.getElementById('btnExport2').disabled = !has;
}

// ===== EVENTS =====
document.getElementById('addAnimBtn').addEventListener('click', () => addAnimation());

['cellW','cellH','viewScale','cols','totalFrames'].forEach(id => {
  document.getElementById(id).addEventListener('input', () => {
    updateGrid();
    render();
  });
});
document.getElementById('showGrid').addEventListener('change', e => { S.showGrid = e.target.checked; render(); });
document.getElementById('showNumbers').addEventListener('change', e => { S.showNumbers = e.target.checked; render(); });
document.getElementById('highlightActive').addEventListener('change', e => { S.highlightActive = e.target.checked; render(); });
document.getElementById('btnExport').addEventListener('click', doExport);
document.getElementById('btnExport2').addEventListener('click', doExport);

// Click on sheet to set start/end frame
canvas.addEventListener('click', e => {
  if (!S.img || S.actualFrames === 0) return;
  const rect = canvas.getBoundingClientRect();
  const x = (e.clientX - rect.left) / S.scale;
  const y = (e.clientY - rect.top) / S.scale;
  const col = Math.floor(x / S.cellW);
  const row = Math.floor(y / S.cellH);
  const frame = row * S.actualCols + col;
  if (frame < 0 || frame >= S.actualFrames) return;

  if (S.activeAnimId === null) {
    // Auto-create animation with this as first frame
    addAnimation(frame, frame);
  } else {
    const anim = S.animations.find(a => a.id === S.activeAnimId);
    if (anim) {
      // Shift-click = set start, regular click = set end
      if (e.shiftKey) {
        anim.start = Math.min(frame, anim.end);
      } else {
        anim.end = Math.max(frame, anim.start);
      }
      renderAnimList();
      render();
      updateExportBtn();
    }
  }
});

// ===== UTILS =====
function hexToRgba(hex, alpha) {
  const r = parseInt(hex.slice(1,3), 16);
  const g = parseInt(hex.slice(3,5), 16);
  const b = parseInt(hex.slice(5,7), 16);
  return `rgba(${r},${g},${b},${alpha})`;
}

function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2000);
}

// Init
updateGrid();
</script>
