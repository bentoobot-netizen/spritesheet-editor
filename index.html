<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sprite Sheet Editor</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#1a1a2e;--surface:#16213e;--border:#0f3460;--accent:#e94560;--accent2:#0f3460;--text:#eee;--dim:#666;--success:#1a6b3c}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;display:flex;flex-direction:column;height:100vh;overflow:hidden;user-select:none}

header{padding:8px 16px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;flex-wrap:wrap}
header h1{font-size:15px;margin-right:auto;color:var(--accent)}
.tool-btn{padding:5px 12px;border-radius:5px;border:1px solid var(--border);background:var(--accent2);color:#aaa;cursor:pointer;font-size:12px;transition:all .12s;display:flex;align-items:center;gap:4px}
.tool-btn:hover{background:#1a4080;color:#fff}
.tool-btn.active{background:var(--accent);border-color:var(--accent);color:#fff}
.tool-btn kbd{font-size:10px;background:rgba(0,0,0,.3);padding:1px 4px;border-radius:3px;color:inherit}
.hdr-sep{width:1px;height:20px;background:var(--border);margin:0 4px}
.btn{padding:5px 12px;border-radius:5px;border:1px solid var(--border);background:var(--accent2);color:#ccc;cursor:pointer;font-size:12px;transition:all .12s}
.btn:hover{background:#1a4080;color:#fff}
.btn.primary{background:var(--accent);border-color:var(--accent);color:#fff}
.btn:disabled{opacity:.35;cursor:not-allowed}
.hdr-info{font-size:11px;color:var(--dim);min-width:50px;text-align:center}

.main{flex:1;display:flex;overflow:hidden}

.canvas-area{flex:1;display:flex;flex-direction:column;overflow:hidden;position:relative}
.canvas-wrap{flex:1;overflow:hidden;position:relative;background:repeating-conic-gradient(#222 0% 25%,#1a1a1a 0% 50%) 0 0/20px 20px}
.canvas-wrap canvas{position:absolute;top:0;left:0;image-rendering:pixelated}
.canvas-wrap.panning{cursor:grab}
.canvas-wrap.panning:active{cursor:grabbing}

.empty-msg{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;color:var(--dim);pointer-events:none;z-index:1;display:flex;flex-direction:column;align-items:center;gap:12px}
.empty-msg.hidden{display:none}
.empty-msg p{font-size:15px}
.empty-msg .hint{font-size:12px;line-height:1.6}
.empty-msg .upload-inline-btn{padding:10px 24px;border:2px dashed var(--accent);border-radius:8px;background:rgba(233,69,96,.08);color:var(--accent);cursor:pointer;font-size:13px;transition:all .15s;pointer-events:all}
.empty-msg .upload-inline-btn:hover{background:rgba(233,69,96,.18);border-color:#ff6b81}

.sel-rect{position:absolute;border:2px solid var(--accent);background:rgba(233,69,96,.08);pointer-events:none;z-index:5;display:none}
.sel-rect.active{display:block}

.preview-strip{height:100px;min-height:100px;background:var(--surface);border-top:1px solid var(--border);display:flex;align-items:center;padding:8px 12px;gap:8px;overflow:hidden}
.preview-strip canvas{image-rendering:pixelated;background:repeating-conic-gradient(#222 0% 25%,#1a1a1a 0% 50%) 0 0/16px 16px;border-radius:4px;flex-shrink:0}
.preview-info{font-size:12px;color:var(--dim);white-space:nowrap}

.sidebar{width:300px;background:var(--surface);border-left:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.sidebar-section{padding:12px 14px;border-bottom:1px solid var(--border)}
.sidebar-section h3{font-size:10px;text-transform:uppercase;color:var(--dim);margin-bottom:8px;letter-spacing:.5px}

.frame-list{flex:1;overflow-y:auto;padding:0 14px 8px;display:flex;flex-direction:column;gap:3px}
.frame-item{display:flex;align-items:center;gap:6px;padding:4px 8px;border-radius:5px;background:var(--bg);border:1px solid transparent;font-size:12px;cursor:pointer;transition:all .1s}
.frame-item:hover{border-color:#1a4080}
.frame-item.selected{border-color:var(--accent);background:rgba(233,69,96,.08)}
.frame-item.in-anim{border-left:3px solid var(--anim-color,var(--accent))}
.frame-item .idx{color:var(--dim);font-size:10px;min-width:20px}
.frame-item .dims{color:var(--dim);font-size:10px;margin-left:auto}
.frame-item .pos{color:var(--dim);font-size:10px}
.frame-item .fi{width:36px;background:var(--accent2);border:1px solid var(--border);color:#ccc;padding:1px 3px;border-radius:3px;font-size:10px;text-align:center;-moz-appearance:textfield}
.frame-item .fi::-webkit-inner-spin-button,.frame-item .fi::-webkit-outer-spin-button{-webkit-appearance:none;margin:0}
.frame-item .fi:focus{outline:1px solid var(--accent);border-color:var(--accent)}
.frame-item .del{background:none;border:none;color:var(--dim);cursor:pointer;font-size:14px;padding:0 2px;line-height:1;opacity:0;transition:opacity .1s}
.frame-item:hover .del{opacity:1}
.frame-item .del:hover{color:var(--accent)}
.frame-list-actions{padding:8px 14px;border-bottom:1px solid var(--border);display:flex;gap:6px}
.frame-list-actions .btn{flex:1;text-align:center;font-size:11px}

.anim-list{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:4px;padding:0 14px 8px}
.anim-card{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:10px;cursor:pointer;transition:all .12s}
.anim-card:hover{border-color:#1a4080}
.anim-card.active{border-color:var(--accent);box-shadow:0 0 8px rgba(233,69,96,.15)}
.anim-card-header{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.anim-card-header .color{width:10px;height:10px;border-radius:3px;flex-shrink:0}
.anim-card-header .name{flex:1;font-size:12px;font-weight:600}
.anim-card-header .frames-count{font-size:10px;color:var(--dim);background:var(--accent2);padding:1px 5px;border-radius:8px}
.anim-card-header .del{background:none;border:none;color:var(--dim);cursor:pointer;font-size:15px;padding:0 2px;line-height:1;opacity:0;transition:opacity .1s}
.anim-card:hover .del{opacity:1}
.anim-card-header .del:hover{color:var(--accent)}
.anim-card-fields{display:grid;grid-template-columns:1fr 1fr;gap:5px}
.anim-card-fields label{font-size:10px;color:var(--dim)}
.anim-card-fields input{width:100%;background:var(--accent2);border:1px solid var(--border);color:#ccc;padding:3px 5px;border-radius:4px;font-size:11px}
.anim-card-fields input:focus{outline:1px solid var(--accent)}
.anim-card-fields .full{grid-column:1/-1}
.anim-card-fields .row{display:flex;align-items:center;gap:5px;grid-column:1/-1}
.anim-card-fields .row input[type="checkbox"]{width:auto;accent-color:var(--accent)}
.anim-card-fields .row span{font-size:11px;color:#888}
.anim-card .playback{display:flex;align-items:center;gap:5px;margin-top:8px;grid-column:1/-1}
.anim-card .playback .btn{padding:3px 8px;font-size:11px}
.anim-card .playback .lbl{font-size:10px;color:var(--dim);margin-left:auto}

.add-anim-btn{margin:6px 14px;padding:7px;border:2px dashed var(--border);border-radius:8px;background:none;color:var(--dim);cursor:pointer;font-size:12px;text-align:center;transition:all .12s;flex-shrink:0}
.add-anim-btn:hover{border-color:var(--accent);color:var(--accent)}

.export-section{padding:12px 14px;border-top:1px solid var(--border);flex-shrink:0;display:flex;gap:6px}
.export-section .btn{flex:1;text-align:center;padding:8px;font-size:12px}

.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:50;display:none;align-items:center;justify-content:center}
.modal-overlay.visible{display:flex}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:12px;width:90%;max-width:700px;max-height:80vh;display:flex;flex-direction:column;overflow:hidden}
.modal-header{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px}
.modal-header h2{font-size:15px;flex:1}
.modal-header .btn{font-size:12px}
.modal-body{flex:1;overflow-y:auto;padding:14px 18px}
.modal-body canvas{max-width:100%;image-rendering:pixelated;border:1px solid var(--border);border-radius:4px}
.crop-frames{display:flex;flex-wrap:wrap;gap:8px;margin-top:12px}
.crop-frame{background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:6px;cursor:grab;font-size:11px;text-align:center;transition:all .1s}
.crop-frame:hover{border-color:#1a4080}
.crop-frame.dragging{opacity:.5}
.crop-frame canvas{image-rendering:pixelated;display:block;background:repeating-conic-gradient(#222 0% 25%,#1a1a1a 0% 50%) 0 0/8px 8px}
.crop-frame .label{margin-top:4px;color:var(--dim)}
.crop-info{font-size:12px;color:var(--dim);margin-top:12px;line-height:1.6}

.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--success);color:#fff;padding:8px 18px;border-radius:8px;font-size:13px;opacity:0;transition:opacity .3s;pointer-events:none;z-index:100}
.toast.show{opacity:1}

.drop-overlay{position:absolute;inset:0;background:rgba(233,69,96,.12);border:3px dashed var(--accent);display:none;align-items:center;justify-content:center;z-index:10;font-size:15px;color:var(--accent)}
.drop-overlay.visible{display:flex}

::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:#1a4080}

.tabs{display:flex;border-bottom:1px solid var(--border)}
.tab{flex:1;padding:8px;text-align:center;font-size:11px;color:var(--dim);cursor:pointer;border-bottom:2px solid transparent;transition:all .12s}
.tab:hover{color:#ccc}
.tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.tab-content{flex:1;overflow-y:auto;display:none;flex-direction:column}
.tab-content.active{display:flex}
</style>
</head>
<body>

<header>
  <h1>🎯 Sprite Sheet Editor</h1>
  <button class="tool-btn active" id="toolSelect" data-tool="select"><kbd>V</kbd> Select</button>
  <button class="tool-btn" id="toolHand" data-tool="hand"><kbd>H</kbd> Hand</button>
  <button class="tool-btn" id="toolRect" data-tool="rect"><kbd>R</kbd> Rectangle</button>
  <div class="hdr-sep"></div>
  <button class="btn" id="btnZoomIn">🔍+</button>
  <button class="btn" id="btnZoomOut">🔍-</button>
  <button class="btn" id="btnFit">Fit</button>
  <span class="hdr-info" id="zoomLevel">1x</span>
  <div class="hdr-sep"></div>
  <button class="btn" id="btnUpload">📁 Upload</button>
  <input type="file" id="fileInput" accept="image/png" hidden>
  <button class="btn primary" id="btnExport" disabled>💾 Export</button>
  <button class="btn" id="btnCrop" disabled>✂️ Crop</button>
</header>

<div class="main">
  <div class="canvas-area">
    <div class="canvas-wrap" id="canvasWrap">
      <canvas id="sheetCanvas"></canvas>
      <div class="sel-rect" id="selRect"></div>
      <div class="empty-msg" id="emptyMsg">
        <p>📁 Upload a sprite sheet PNG</p>
        <div class="hint">Press <b>R</b> to draw frames · <b>Space+drag</b> to pan · <b>Scroll</b> to zoom</div>
        <button class="upload-inline-btn" id="btnUploadInline">📁 Upload PNG</button>
      </div>
      <div class="drop-overlay" id="dropOverlay">Drop PNG here</div>
    </div>
    <div class="preview-strip" id="previewStrip">
      <canvas id="previewCanvas" width="0" height="0"></canvas>
      <div class="preview-info" id="previewInfo">Select an animation to preview</div>
    </div>
  </div>

  <div class="sidebar">
    <div class="tabs">
      <div class="tab active" data-tab="frames">Frames (<span id="frameCount">0</span>)</div>
      <div class="tab" data-tab="anims">Anims (<span id="animCount">0</span>)</div>
    </div>
    <div class="tab-content active" id="tabFrames">
      <div class="frame-list-actions">
        <button class="btn" id="btnSelectAll">All</button>
        <button class="btn" id="btnDeselectAll">None</button>
        <button class="btn" id="btnDeleteSelected">🗑️</button>
        <button class="btn" id="btnMoveUp">↑</button>
        <button class="btn" id="btnMoveDown">↓</button>
      </div>
      <div class="frame-list" id="frameList"></div>
    </div>
    <div class="tab-content" id="tabAnims">
      <div class="anim-list" id="animList"></div>
      <button class="add-anim-btn" id="addAnimBtn">+ Add Animation</button>
    </div>
    <div class="export-section">
      <button class="btn primary" id="btnExport2" disabled>💾 Export</button>
      <button class="btn" id="btnCrop2" disabled>✂️ Crop</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="cropModal">
  <div class="modal">
    <div class="modal-header">
      <h2>✂️ Crop & Reorder</h2>
      <button class="btn" id="cropExport">💾 Export Cropped</button>
      <button class="btn" id="cropClose">✕</button>
    </div>
    <div class="modal-body">
      <canvas id="cropPreview"></canvas>
      <div class="crop-frames" id="cropFrames"></div>
      <div class="crop-info">Drag to reorder. "Export Cropped" exports selected frames as clean sheet + JSON.</div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ===== STATE =====
const S = {
  img: null, imgW: 0, imgH: 0,
  frames: [],
  nextFrameId: 1,
  animations: [],
  nextAnimId: 1,
  colorIdx: 0,
  colors: ['#e94560','#0fbcf9','#f39c12','#2ecc71','#9b59b6','#1abc9c','#e74c3c','#3498db','#e67e22','#1dd1a1','#5f27cd','#fd79a8'],
  tool: 'select',
  zoom: 1, panX: 0, panY: 0,
  // Interaction state machine
  mode: 'idle', // 'idle' | 'panning' | 'drawing' | 'resizing' | 'dragging'
  // Pan
  panStartMX: 0, panStartMY: 0, panStartPX: 0, panStartPY: 0,
  // Draw
  drawStartIX: 0, drawStartIY: 0,
  // Resize
  resizeFrameId: null, resizeHandle: '', resizeOrig: null,
  // Drag
  dragFrameId: null, dragOrig: null, dragStartMX: 0, dragStartMY: 0,
  // UI
  selectedFrameIds: new Set(),
  activeAnimId: null, playingAnimId: null,
  showNumbers: true, highlightActive: true,
  spaceDown: false,
};

const HANDLE_SIZE = 8;   // visual size in canvas-space
const HANDLE_HIT = 12;   // hit area in screen-space

const canvas = document.getElementById('sheetCanvas');
const ctx = canvas.getContext('2d');
const wrap = document.getElementById('canvasWrap');
const selRectEl = document.getElementById('selRect');
const prevCanvas = document.getElementById('previewCanvas');
const prevCtx = prevCanvas.getContext('2d');

// ===== COORDINATE HELPERS =====
function imgToScreen(ix, iy) {
  const r = wrap.getBoundingClientRect();
  return [ix * S.zoom + S.panX + r.left, iy * S.zoom + S.panY + r.top];
}
function screenToImg(sx, sy) {
  const r = wrap.getBoundingClientRect();
  return [(sx - r.left - S.panX) / S.zoom, (sy - r.top - S.panY) / S.zoom];
}
function wrapCoords(e) {
  const r = wrap.getBoundingClientRect();
  return [e.clientX - r.left, e.clientY - r.top];
}

// ===== TOOLS =====
function setTool(t) {
  S.tool = t;
  document.querySelectorAll('.tool-btn').forEach(b => b.classList.toggle('active', b.dataset.tool === t));
  wrap.classList.toggle('panning', t === 'hand');
}
document.getElementById('toolSelect').addEventListener('click', () => setTool('select'));
document.getElementById('toolHand').addEventListener('click', () => setTool('hand'));
document.getElementById('toolRect').addEventListener('click', () => setTool('rect'));

// ===== KEYBOARD =====
window.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT') return;
  if (e.code === 'Space' && !e.repeat) { e.preventDefault(); S.spaceDown = true; wrap.classList.add('panning'); }
  if (e.code === 'KeyR' && !e.repeat) setTool('rect');
  if (e.code === 'KeyV' && !e.repeat) setTool('select');
  if (e.code === 'KeyH' && !e.repeat) setTool('hand');
  if (e.code === 'KeyA' && (e.ctrlKey || e.metaKey)) { e.preventDefault(); S.frames.forEach(f => S.selectedFrameIds.add(f.id)); refresh(); }
  if (e.code === 'KeyD' && (e.ctrlKey || e.metaKey)) { e.preventDefault(); duplicateSelected(); }
  if (e.code === 'Delete' || e.code === 'Backspace') { if (S.selectedFrameIds.size > 0) deleteSelectedFrames(); }
  // Arrow keys move selected frame 1px
  const arrowMap = { ArrowUp:[0,-1], ArrowDown:[0,1], ArrowLeft:[-1,0], ArrowRight:[1,0] };
  if (arrowMap[e.code] && S.selectedFrameIds.size > 0 && !e.ctrlKey && !e.metaKey) {
    e.preventDefault();
    const [dx, dy] = arrowMap[e.code];
    S.selectedFrameIds.forEach(fid => {
      const f = S.frames.find(fr => fr.id === fid);
      if (f) { f.x += dx; f.y += dy; }
    });
    refresh();
  }
});
window.addEventListener('keyup', e => {
  if (e.code === 'Space') { S.spaceDown = false; if (S.mode !== 'panning') wrap.classList.remove('panning'); }
});

// ===== UPLOAD =====
const fileInput = document.getElementById('fileInput');
function triggerUpload() { fileInput.value = ''; fileInput.click(); }
document.getElementById('btnUpload').addEventListener('click', triggerUpload);
document.getElementById('btnUploadInline').addEventListener('click', triggerUpload);
fileInput.addEventListener('change', e => { if (e.target.files[0]) loadImage(e.target.files[0]); });
['dragenter','dragover'].forEach(ev => wrap.addEventListener(ev, e => { e.preventDefault(); document.getElementById('dropOverlay').classList.add('visible'); }));
['dragleave','drop'].forEach(ev => wrap.addEventListener(ev, e => { e.preventDefault(); document.getElementById('dropOverlay').classList.remove('visible'); }));
wrap.addEventListener('drop', e => { const f = e.dataTransfer.files[0]; if (f && f.type === 'image/png') loadImage(f); });

function loadImage(file) {
  const url = URL.createObjectURL(file);
  const img = new Image();
  img.onload = () => {
    S.img = img; S.imgW = img.width; S.imgH = img.height;
    S.frames = []; S.selectedFrameIds.clear();
    document.getElementById('emptyMsg').classList.add('hidden');
    fitToView();
    refresh();
    toast(`Loaded: ${img.width}×${img.height}px`);
  };
  img.src = url;
}

// ===== ZOOM & PAN =====
function fitToView() {
  if (!S.img) return;
  const ww = wrap.clientWidth - 20, wh = wrap.clientHeight - 20;
  S.zoom = Math.min(ww / S.imgW, wh / S.imgH, 4);
  S.panX = (wrap.clientWidth - S.imgW * S.zoom) / 2;
  S.panY = (wrap.clientHeight - S.imgH * S.zoom) / 2;
  updateZoomLabel(); render();
}
function updateZoomLabel() { document.getElementById('zoomLevel').textContent = S.zoom.toFixed(1) + 'x'; }

function zoomToward(newZoom, px, py) {
  const old = S.zoom;
  S.zoom = Math.max(0.1, Math.min(20, newZoom));
  S.panX = px - (px - S.panX) * (S.zoom / old);
  S.panY = py - (py - S.panY) * (S.zoom / old);
  updateZoomLabel(); render();
}

document.getElementById('btnZoomIn').addEventListener('click', () => zoomToward(S.zoom * 1.4, wrap.clientWidth/2, wrap.clientHeight/2));
document.getElementById('btnZoomOut').addEventListener('click', () => zoomToward(S.zoom / 1.4, wrap.clientWidth/2, wrap.clientHeight/2));
document.getElementById('btnFit').addEventListener('click', fitToView);

wrap.addEventListener('wheel', e => {
  if (!S.img) return;
  e.preventDefault();
  const [wx, wy] = wrapCoords(e);
  const factor = e.deltaY < 0 ? 1.04 : 1/1.04; // much gentler
  zoomToward(S.zoom * factor, wx, wy);
}, { passive: false });

// ===== HANDLE DETECTION =====
const HANDLE_NAMES = ['tl','tc','tr','ml','mr','bl','bc','br'];

function getHandlePositions(frame) {
  const [sx, sy] = imgToScreen(frame.x, frame.y);
  const sw = frame.w * S.zoom, sh = frame.h * S.zoom;
  return [
    { name:'tl', x:sx,          y:sy },
    { name:'tc', x:sx+sw/2,     y:sy },
    { name:'tr', x:sx+sw,       y:sy },
    { name:'ml', x:sx,           y:sy+sh/2 },
    { name:'mr', x:sx+sw,       y:sy+sh/2 },
    { name:'bl', x:sx,           y:sy+sh },
    { name:'bc', x:sx+sw/2,     y:sy+sh },
    { name:'br', x:sx+sw,       y:sy+sh },
  ];
}

function hitTestHandle(clientX, clientY) {
  if (S.selectedFrameIds.size !== 1) return null;
  const fid = [...S.selectedFrameIds][0];
  const frame = S.frames.find(f => f.id === fid);
  if (!frame) return null;
  const handles = getHandlePositions(frame);
  for (const h of handles) {
    if (Math.abs(clientX - h.x) <= HANDLE_HIT && Math.abs(clientY - h.y) <= HANDLE_HIT) return h;
  }
  return null;
}

function hitTestFrame(clientX, clientY) {
  const [ix, iy] = screenToImg(clientX, clientY);
  for (let i = S.frames.length - 1; i >= 0; i--) {
    const f = S.frames[i];
    if (ix >= f.x && ix <= f.x + f.w && iy >= f.y && iy <= f.y + f.h) return f;
  }
  return null;
}

function cursorForHandle(name) {
  return ({tl:'nw-resize',tc:'n-resize',tr:'ne-resize',ml:'w-resize',mr:'e-resize',bl:'sw-resize',bc:'s-resize',br:'se-resize'})[name] || 'default';
}

// ===== UNIFIED MOUSE HANDLER =====
wrap.addEventListener('mousedown', e => {
  if (!S.img) return;

  // Pan: middle-click, space+left, or hand tool
  if (e.button === 1 || (e.button === 0 && (S.spaceDown || S.tool === 'hand'))) {
    e.preventDefault();
    S.mode = 'panning';
    S.panStartMX = e.clientX; S.panStartMY = e.clientY;
    S.panStartPX = S.panX; S.panStartPY = S.panY;
    wrap.classList.add('panning');
    return;
  }
  if (e.button !== 0) return;

  const cx = e.clientX, cy = e.clientY;

  // Check handle resize first (any tool)
  const handle = hitTestHandle(cx, cy);
  if (handle) {
    e.preventDefault();
    const fid = [...S.selectedFrameIds][0];
    const frame = S.frames.find(f => f.id === fid);
    S.mode = 'resizing';
    S.resizeFrameId = fid;
    S.resizeHandle = handle.name;
    S.resizeOrig = { x:frame.x, y:frame.y, w:frame.w, h:frame.h };
    return;
  }

  if (S.tool === 'rect') {
    // Start drawing new rectangle
    e.preventDefault();
    const [ix, iy] = screenToImg(cx, cy);
    S.mode = 'drawing';
    S.drawStartIX = ix; S.drawStartIY = iy;
    selRectEl.classList.add('active');
    return;
  }

  if (S.tool === 'select') {
    const frame = hitTestFrame(cx, cy);
    if (frame) {
      if (S.selectedFrameIds.has(frame.id)) {
        // Start drag
        e.preventDefault();
        S.mode = 'dragging';
        S.dragFrameId = frame.id;
        S.dragOrig = { x:frame.x, y:frame.y };
        S.dragStartMX = cx; S.dragStartMY = cy;
      } else {
        // Select + start drag
        if (!e.shiftKey) S.selectedFrameIds.clear();
        S.selectedFrameIds.add(frame.id);
        e.preventDefault();
        S.mode = 'dragging';
        S.dragFrameId = frame.id;
        S.dragOrig = { x:frame.x, y:frame.y };
        S.dragStartMX = cx; S.dragStartMY = cy;
        refresh();
      }
    } else {
      // Deselect
      if (!e.shiftKey) S.selectedFrameIds.clear();
      refresh();
    }
  }
});

window.addEventListener('mousemove', e => {
  const cx = e.clientX, cy = e.clientY;

  if (S.mode === 'panning') {
    S.panX = S.panStartPX + (cx - S.panStartMX);
    S.panY = S.panStartPY + (cy - S.panStartMY);
    canvas.style.transform = `translate(${S.panX}px,${S.panY}px)`;
    return;
  }

  if (S.mode === 'drawing') {
    const [wx, wy] = wrapCoords(e);
    const [sx, sy] = imgToScreen(S.drawStartIX, S.drawStartIY);
    const l = Math.min(sx - wrap.getBoundingClientRect().left, wx);
    const t = Math.min(sy - wrap.getBoundingClientRect().top, wy);
    selRectEl.style.left = l + 'px';
    selRectEl.style.top = t + 'px';
    selRectEl.style.width = Math.abs(wx - (sx - wrap.getBoundingClientRect().left)) + 'px';
    selRectEl.style.height = Math.abs(wy - (sy - wrap.getBoundingClientRect().top)) + 'px';
    return;
  }

  if (S.mode === 'resizing') {
    const frame = S.frames.find(f => f.id === S.resizeFrameId);
    if (!frame) return;
    const [ix, iy] = screenToImg(cx, cy);
    const o = S.resizeOrig;
    const h = S.resizeHandle;
    const MIN = 3;
    let nx = o.x, ny = o.y, nw = o.w, nh = o.h;

    if (h === 'tl' || h === 'ml' || h === 'bl') { nx = ix; nw = o.x + o.w - ix; }
    if (h === 'tr' || h === 'mr' || h === 'br') { nw = ix - o.x; }
    if (h === 'tl' || h === 'tc' || h === 'tr') { ny = iy; nh = o.y + o.h - iy; }
    if (h === 'bl' || h === 'bc' || h === 'br') { nh = iy - o.y; }

    if (nw < MIN) { if (h === 'tl' || h === 'ml' || h === 'bl') nx = o.x + o.w - MIN; nw = MIN; }
    if (nh < MIN) { if (h === 'tl' || h === 'tc' || h === 'tr') ny = o.y + o.h - MIN; nh = MIN; }

    frame.x = Math.round(nx); frame.y = Math.round(ny);
    frame.w = Math.round(nw); frame.h = Math.round(nh);
    renderFrameList(); render();
    return;
  }

  if (S.mode === 'dragging') {
    const frame = S.frames.find(f => f.id === S.dragFrameId);
    if (!frame) return;
    const dx = (cx - S.dragStartMX) / S.zoom;
    const dy = (cy - S.dragStartMY) / S.zoom;
    frame.x = Math.round(S.dragOrig.x + dx);
    frame.y = Math.round(S.dragOrig.y + dy);
    renderFrameList(); render();
    return;
  }

  // Idle: update cursor
  if (!S.img || S.spaceDown) return;
  if (S.tool === 'rect') { canvas.style.cursor = 'crosshair'; return; }
  const handle = hitTestHandle(cx, cy);
  if (handle) { canvas.style.cursor = cursorForHandle(handle.name); return; }
  const frame = hitTestFrame(cx, cy);
  canvas.style.cursor = frame ? 'move' : 'default';
});

window.addEventListener('mouseup', e => {
  if (S.mode === 'panning') {
    S.mode = 'idle';
    if (!S.spaceDown) wrap.classList.remove('panning');
    return;
  }
  if (S.mode === 'drawing') {
    S.mode = 'idle';
    selRectEl.classList.remove('active');
    const [ix, iy] = screenToImg(e.clientX, e.clientY);
    const x = Math.round(Math.min(S.drawStartIX, ix));
    const y = Math.round(Math.min(S.drawStartIY, iy));
    const w = Math.round(Math.abs(ix - S.drawStartIX));
    const h = Math.round(Math.abs(iy - S.drawStartIY));
    if (w >= 3 && h >= 3) {
      const frame = { id: S.nextFrameId++, x, y, w, h };
      S.frames.push(frame);
      S.selectedFrameIds.clear();
      S.selectedFrameIds.add(frame.id);
      refresh();
      toast(`Frame #${S.frames.length} (${w}×${h})`);
    }
    return;
  }
  if (S.mode === 'resizing' || S.mode === 'dragging') {
    S.mode = 'idle';
    S.resizeFrameId = null;
    S.dragFrameId = null;
    updateExportBtn();
    return;
  }
});

// ===== FRAME LIST =====
function renderFrameList() {
  const list = document.getElementById('frameList');
  list.innerHTML = '';
  document.getElementById('frameCount').textContent = S.frames.length;
  if (S.frames.length === 0) { list.innerHTML = '<div style="color:var(--dim);font-size:12px;padding:10px;text-align:center">Draw rectangles with <b>R</b> tool</div>'; return; }
  S.frames.forEach((f, i) => {
    const div = document.createElement('div');
    div.className = 'frame-item' + (S.selectedFrameIds.has(f.id) ? ' selected' : '');
    const activeAnim = S.animations.find(a => a.id === S.activeAnimId);
    if (activeAnim && activeAnim.frameIds.includes(f.id)) { div.classList.add('in-anim'); div.style.setProperty('--anim-color', activeAnim.color); }
    div.innerHTML = `<span class="idx">#${i}</span><span class="pos">${f.x},${f.y}</span><input class="fi" type="number" value="${f.w}" data-fid="${f.id}" data-prop="w" title="Width"><span>×</span><input class="fi" type="number" value="${f.h}" data-fid="${f.id}" data-prop="h" title="Height"><span class="del" data-del="${f.id}">×</span>`;
    div.addEventListener('click', ev => {
      if (ev.target.closest('[data-del]') || ev.target.tagName === 'INPUT') return;
      if (ev.shiftKey) { S.selectedFrameIds.has(f.id) ? S.selectedFrameIds.delete(f.id) : S.selectedFrameIds.add(f.id); }
      else { S.selectedFrameIds.clear(); S.selectedFrameIds.add(f.id); }
      renderFrameList(); render();
    });
    div.querySelectorAll('.fi').forEach(inp => {
      const stop = e => e.stopPropagation();
      inp.addEventListener('click', stop); inp.addEventListener('mousedown', stop);
      inp.addEventListener('change', ev => {
        const val = parseInt(ev.target.value);
        if (isNaN(val) || val < 3) return;
        f[ev.target.dataset.prop] = val;
        render();
      });
    });
    div.querySelector('[data-del]').addEventListener('click', ev => {
      ev.stopPropagation();
      S.frames = S.frames.filter(fr => fr.id !== f.id);
      S.selectedFrameIds.delete(f.id);
      S.animations.forEach(a => a.frameIds = a.frameIds.filter(fid => fid !== f.id));
      refresh();
    });
    list.appendChild(div);
  });
}

document.getElementById('btnSelectAll').addEventListener('click', () => { S.frames.forEach(f => S.selectedFrameIds.add(f.id)); refresh(); });
document.getElementById('btnDeselectAll').addEventListener('click', () => { S.selectedFrameIds.clear(); refresh(); });
document.getElementById('btnDeleteSelected').addEventListener('click', deleteSelectedFrames);
document.getElementById('btnMoveUp').addEventListener('click', moveSelected(-1));
document.getElementById('btnMoveDown').addEventListener('click', moveSelected(1));

function deleteSelectedFrames() {
  S.frames = S.frames.filter(f => !S.selectedFrameIds.has(f.id));
  S.animations.forEach(a => a.frameIds = a.frameIds.filter(fid => !S.selectedFrameIds.has(fid)));
  S.selectedFrameIds.clear(); refresh();
}

// Smart duplicate (Figma-style Ctrl+D)
// Tracks: when you Ctrl+D, move the copy, then Ctrl+D again → uses the move delta
let lastDupOrigId = null;
let lastDupCopyId = null;
function duplicateSelected() {
  if (S.selectedFrameIds.size !== 1) return;
  const fid = [...S.selectedFrameIds][0];
  const orig = S.frames.find(f => f.id === fid);
  if (!orig) return;

  // Calculate offset
  let dx = 20, dy = 20;
  if (lastDupOrigId === orig.id && lastDupCopyId) {
    // User may have moved the copy — measure actual offset
    const prevCopy = S.frames.find(f => f.id === lastDupCopyId);
    if (prevCopy) { dx = prevCopy.x - orig.x; dy = prevCopy.y - orig.y; }
    if (dx === 0 && dy === 0) { dx = 20; dy = 20; }
  }

  const dup = { id: S.nextFrameId++, x: orig.x + dx, y: orig.y + dy, w: orig.w, h: orig.h };
  S.frames.push(dup);
  lastDupOrigId = orig.id;
  lastDupCopyId = dup.id;
  S.selectedFrameIds.clear();
  S.selectedFrameIds.add(dup.id);
  refresh();
  toast(`Duplicated → #${S.frames.length}`);
}
function moveSelected(dir) {
  return () => {
    if (S.selectedFrameIds.size !== 1) return;
    const fid = [...S.selectedFrameIds][0], idx = S.frames.findIndex(f => f.id === fid), ni = idx + dir;
    if (ni < 0 || ni >= S.frames.length) return;
    [S.frames[idx], S.frames[ni]] = [S.frames[ni], S.frames[idx]];
    renderFrameList(); render();
  };
}

// ===== RENDER =====
function render() {
  if (!S.img) return;
  canvas.width = S.imgW * S.zoom;
  canvas.height = S.imgH * S.zoom;
  canvas.style.transform = `translate(${S.panX}px,${S.panY}px)`;
  ctx.imageSmoothingEnabled = false;
  ctx.drawImage(S.img, 0, 0, canvas.width, canvas.height);

  S.frames.forEach((f, i) => {
    const x = f.x * S.zoom, y = f.y * S.zoom, w = f.w * S.zoom, h = f.h * S.zoom;
    const sel = S.selectedFrameIds.has(f.id);

    if (S.highlightActive && S.activeAnimId !== null) {
      const anim = S.animations.find(a => a.id === S.activeAnimId);
      if (anim && anim.frameIds.includes(f.id)) { ctx.fillStyle = hexToRgba(anim.color, 0.15); ctx.fillRect(x, y, w, h); }
    }
    if (sel) {
      ctx.fillStyle = 'rgba(233,69,96,0.1)'; ctx.fillRect(x, y, w, h);
      ctx.strokeStyle = '#e94560'; ctx.lineWidth = 2; ctx.setLineDash([4, 3]); ctx.strokeRect(x+1, y+1, w-2, h-2); ctx.setLineDash([]);
    } else {
      ctx.strokeStyle = 'rgba(255,255,255,0.35)'; ctx.lineWidth = 1; ctx.strokeRect(x+.5, y+.5, w-1, h-1);
    }
    if (S.showNumbers) {
      ctx.fillStyle = sel ? '#e94560' : 'rgba(255,255,255,0.5)';
      ctx.font = `${Math.max(10, S.zoom * 8)}px monospace`; ctx.textAlign = 'left'; ctx.textBaseline = 'top';
      ctx.fillText('#' + i, x + 3, y + 3);
    }
    if (sel && S.selectedFrameIds.size === 1) drawHandles(f);
  });
}

function drawHandles(f) {
  const x = f.x * S.zoom, y = f.y * S.zoom, w = f.w * S.zoom, h = f.h * S.zoom;
  const s = HANDLE_SIZE;
  const pts = [[x,y],[x+w/2,y],[x+w,y],[x,y+h/2],[x+w,y+h/2],[x,y+h],[x+w/2,y+h],[x+w,y+h]];
  pts.forEach(([hx, hy]) => {
    ctx.fillStyle = '#fff'; ctx.fillRect(hx-s/2, hy-s/2, s, s);
    ctx.strokeStyle = '#e94560'; ctx.lineWidth = 1.5; ctx.strokeRect(hx-s/2, hy-s/2, s, s);
  });
}

// ===== ANIMATIONS =====
function addAnimation() {
  const ids = S.selectedFrameIds.size > 0 ? [...S.selectedFrameIds] : S.frames.map(f => f.id);
  if (ids.length === 0) return;
  const id = S.nextAnimId++;
  const color = S.colors[S.colorIdx++ % S.colors.length];
  S.animations.push({ id, name: `anim_${id}`, frameIds: ids, timing: 150, loop: true, color });
  S.activeAnimId = id; refresh();
}

function removeAnimation(id) {
  S.animations = S.animations.filter(a => a.id !== id);
  if (S.activeAnimId === id) S.activeAnimId = S.animations.length > 0 ? S.animations[0].id : null;
  if (S.playingAnimId === id) stopPreview();
  refresh();
}

function renderAnimList() {
  const list = document.getElementById('animList');
  list.innerHTML = '';
  document.getElementById('animCount').textContent = S.animations.length;
  if (S.animations.length === 0) { list.innerHTML = '<div style="color:var(--dim);font-size:12px;padding:10px;text-align:center">Define frame ranges as animations</div>'; return; }
  S.animations.forEach(anim => {
    const card = document.createElement('div');
    card.className = 'anim-card' + (anim.id === S.activeAnimId ? ' active' : '');
    const fps = (1000 / anim.timing).toFixed(1);
    const fis = anim.frameIds.map(fid => S.frames.findIndex(f => f.id === fid)).filter(i => i >= 0);
    const lbl = fis.length > 0 ? `#${fis[0]}→#${fis[fis.length-1]}` : 'no frames';
    card.innerHTML = `
      <div class="anim-card-header"><div class="color" style="background:${anim.color}"></div><div class="name">${anim.name}</div><div class="frames-count">${anim.frameIds.length}f</div><button class="del" data-del="${anim.id}">×</button></div>
      <div class="anim-card-fields">
        <div class="full"><label>Name</label><input type="text" value="${anim.name}" data-field="name"></div>
        <div><label>Timing (ms)</label><input type="number" value="${anim.timing}" min="16" max="2000" step="10" data-field="timing"></div>
        <div><label>FPS</label><input type="text" value="${fps}" disabled style="opacity:.5"></div>
        <div class="row"><input type="checkbox" ${anim.loop?'checked':''} data-field="loop"><span>Loop</span></div>
        <div class="playback"><button class="btn" data-play="${anim.id}">▶ Play</button><button class="btn" data-stop="${anim.id}">⏹</button><span class="lbl">${lbl}</span></div>
      </div>`;
    card.addEventListener('click', e => {
      if (e.target.closest('[data-field]') || e.target.closest('[data-del]') || e.target.closest('[data-play]') || e.target.closest('[data-stop]')) return;
      S.activeAnimId = anim.id; refresh();
    });
    card.querySelectorAll('[data-field]').forEach(input => {
      const stop = e => e.stopPropagation();
      input.addEventListener('click', stop); input.addEventListener('mousedown', stop);
      input.addEventListener('change', e => {
        const f = e.target.dataset.field;
        if (f === 'loop') anim.loop = e.target.checked;
        else if (f === 'name') anim.name = e.target.value;
        else anim[f] = parseInt(e.target.value) || 0;
        renderAnimList(); updateExportBtn();
      });
    });
    card.querySelector('[data-del]').addEventListener('click', e => { e.stopPropagation(); removeAnimation(anim.id); });
    card.querySelector('[data-play]').addEventListener('click', e => { e.stopPropagation(); playPreview(anim.id); });
    card.querySelector('[data-stop]').addEventListener('click', e => { e.stopPropagation(); stopPreview(); });
    list.appendChild(card);
  });
}
document.getElementById('addAnimBtn').addEventListener('click', addAnimation);

// ===== PREVIEW =====
function playPreview(animId) {
  stopPreview();
  const anim = S.animations.find(a => a.id === animId);
  if (!anim || !S.img || anim.frameIds.length === 0) return;
  S.playingAnimId = animId;
  let maxW = 0, maxH = 0;
  anim.frameIds.forEach(fid => { const f = S.frames.find(fr => fr.id === fid); if (f) { maxW = Math.max(maxW, f.w); maxH = Math.max(maxH, f.h); } });
  const sc = Math.min(2, 120 / Math.max(maxW, maxH));
  prevCanvas.width = Math.round(maxW * sc); prevCanvas.height = Math.round(maxH * sc);
  document.getElementById('previewInfo').textContent = `${anim.name} — ${anim.frameIds.length}f @ ${(1000/anim.timing).toFixed(1)}fps ${anim.loop?'🔁':'▶️'}`;
  let fi = 0, lt = 0;
  function tick(t) {
    if (S.playingAnimId !== animId) return;
    if (!lt) lt = t;
    if (t - lt >= anim.timing) { lt = t; fi++; if (fi >= anim.frameIds.length) fi = anim.loop ? 0 : anim.frameIds.length - 1; }
    const f = S.frames.find(fr => fr.id === anim.frameIds[fi]);
    if (f) { prevCtx.clearRect(0, 0, prevCanvas.width, prevCanvas.height); prevCtx.imageSmoothingEnabled = false; prevCtx.drawImage(S.img, f.x, f.y, f.w, f.h, (prevCanvas.width-f.w*sc)/2, prevCanvas.height-f.h*sc, f.w*sc, f.h*sc); }
    requestAnimationFrame(tick);
  }
  requestAnimationFrame(tick);
  S.activeAnimId = animId; renderAnimList(); renderFrameList(); render();
}
function stopPreview() {
  S.playingAnimId = null;
  prevCtx.clearRect(0, 0, prevCanvas.width, prevCanvas.height);
  document.getElementById('previewInfo').textContent = 'Select an animation to preview';
}

// ===== EXPORT =====
function generateJSON() {
  const frames = {}, animations = {}, meta = { timing: {}, loop: {} };
  let maxW = 0, maxH = 0;
  S.frames.forEach((f, i) => { frames[`frame_${i}`] = { frame: { x:f.x, y:f.y, w:f.w, h:f.h } }; maxW = Math.max(maxW, f.w); maxH = Math.max(maxH, f.h); });
  S.animations.forEach(a => {
    animations[a.name] = a.frameIds.map(fid => { const i = S.frames.findIndex(f => f.id === fid); return i >= 0 ? `frame_${i}` : null; }).filter(Boolean);
    meta.timing[a.name] = a.timing; meta.loop[a.name] = a.loop;
  });
  return { frames, animations, meta: { image:'spritesheet.png', size:{w:S.imgW,h:S.imgH}, scale:1, frameSize:{w:maxW,h:maxH}, ...meta } };
}

function doExport() {
  const json = generateJSON();
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([JSON.stringify(json, null, 2)], { type:'application/json' }));
  a.download = 'spritesheet.json'; a.click(); URL.revokeObjectURL(a.href); toast('✅ JSON exported!');
}

function updateExportBtn() {
  const has = S.img && S.frames.length > 0;
  document.getElementById('btnExport').disabled = !has;
  document.getElementById('btnExport2').disabled = !has;
  document.getElementById('btnCrop').disabled = !has;
  document.getElementById('btnCrop2').disabled = !has;
}

document.getElementById('btnExport').addEventListener('click', doExport);
document.getElementById('btnExport2').addEventListener('click', doExport);

// ===== CROP =====
function openCropModal() {
  if (!S.img || S.frames.length === 0) return;
  document.getElementById('cropModal').classList.add('visible');
  renderCropPreview();
}
function renderCropPreview() {
  const c = document.getElementById('cropFrames'); c.innerHTML = '';
  S.frames.forEach((f, i) => {
    const div = document.createElement('div');
    div.className = 'crop-frame'; div.dataset.id = f.id; div.draggable = true;
    const sc = Math.min(1, 80 / Math.max(f.w, f.h));
    const cv = document.createElement('canvas'); cv.width = f.w; cv.height = f.h;
    cv.style.width = Math.round(f.w*sc)+'px'; cv.style.height = Math.round(f.h*sc)+'px';
    cv.getContext('2d').drawImage(S.img, f.x, f.y, f.w, f.h, 0, 0, f.w, f.h);
    div.appendChild(cv);
    const lbl = document.createElement('div'); lbl.className = 'label'; lbl.textContent = `#${i} (${f.w}×${f.h})`; div.appendChild(lbl);
    div.addEventListener('dragstart', e => { e.dataTransfer.setData('text/plain', f.id); div.classList.add('dragging'); });
    div.addEventListener('dragend', () => div.classList.remove('dragging'));
    div.addEventListener('dragover', e => { e.preventDefault(); div.style.borderColor = 'var(--accent)'; });
    div.addEventListener('dragleave', () => div.style.borderColor = '');
    div.addEventListener('drop', e => {
      e.preventDefault(); div.style.borderColor = '';
      const fromId = parseInt(e.dataTransfer.getData('text/plain'));
      if (fromId === f.id) return;
      const fi = S.frames.findIndex(fr => fr.id === fromId), ti = S.frames.findIndex(fr => fr.id === f.id);
      const [moved] = S.frames.splice(fi, 1); S.frames.splice(ti, 0, moved);
      renderCropPreview(); renderFrameList(); render();
    });
    c.appendChild(div);
  });
}
function exportCrop() {
  if (!S.img || S.frames.length === 0) return;
  let totalW = 0, maxH = 0;
  S.frames.forEach(f => { totalW += f.w; maxH = Math.max(maxH, f.h); });
  const oc = document.createElement('canvas'); oc.width = totalW; oc.height = maxH;
  const ox = oc.getContext('2d'); ox.imageSmoothingEnabled = false;
  let x = 0; const rects = [];
  S.frames.forEach((f, i) => { ox.drawImage(S.img, f.x, f.y, f.w, f.h, x, maxH-f.h, f.w, f.h); rects.push({x,y:maxH-f.h,w:f.w,h:f.h}); x += f.w; });
  oc.toBlob(b => { const a = document.createElement('a'); a.href = URL.createObjectURL(b); a.download = 'spritesheet.png'; a.click(); }, 'image/png');
  const json = generateJSON();
  const nf = {}; S.frames.forEach((f, i) => nf[`frame_${i}`] = { frame: rects[i] });
  json.frames = nf; json.meta.size = {w:totalW,h:maxH}; json.meta.image = 'spritesheet.png';
  const jb = new Blob([JSON.stringify(json, null, 2)], {type:'application/json'});
  const ja = document.createElement('a'); ja.href = URL.createObjectURL(jb); ja.download = 'spritesheet.json'; ja.click();
  toast('✅ Cropped sheet + JSON exported!');
}

document.getElementById('btnCrop').addEventListener('click', openCropModal);
document.getElementById('btnCrop2').addEventListener('click', openCropModal);
document.getElementById('cropClose').addEventListener('click', () => document.getElementById('cropModal').classList.remove('visible'));
